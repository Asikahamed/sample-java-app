name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - bugfix/**
      - hotfix/**

  pull_request:
    branches:
      - main
      - develop

jobs:
  java-ci:
    uses: Asikahamed/common-ci/.github/workflows/common-java-ci.yml@main

    with:
      java-version: "20"
      build-tool: "maven"

      image-name: docker.io/asikahameddevops10/sample-java-app

      push-image: true
    
    secrets:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      