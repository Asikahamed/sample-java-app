name: Platform Agent

on:
  push:
      branches:
        - main

  workflow_dispatch:

jobs:
  platform-agent:
    uses: Asikahamed/Platform-agents/.github/workflows/platform-agent-reusable.yml@main

    with:
      app_repository: ${{ github.repository }}
      app_branch: ${{ github.ref_name }}

    secrets:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}